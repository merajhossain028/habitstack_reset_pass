<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - HabitStack</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }
        p {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #333;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .message {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
            font-size: 14px;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .hint {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        .logo {
            text-align: center;
            font-size: 50px;
            margin-bottom: 10px;
        }
        #loading {
            text-align: center;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading">
            <div class="logo">⏳</div>
            <h1>Verifying...</h1>
            <p>Please wait while we verify your reset link</p>
        </div>
        
        <div id="resetFormContainer" style="display: none;">
            <div class="logo">🔒</div>
            <h1>Reset Password</h1>
            <p>Enter your new password below</p>
            
            <div id="message" class="message"></div>
            
            <form id="resetForm">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Enter new password"
                        required 
                        minlength="8"
                    >
                    <div class="hint">At least 8 characters</div>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        placeholder="Confirm new password"
                        required 
                        minlength="8"
                    >
                </div>
                
                <button type="submit" id="submitBtn">Reset Password</button>
            </form>
            
            <p style="margin-top: 20px; font-size: 12px;">
                After resetting, return to the app to log in
            </p>
        </div>
    </div>
    
    <script>
        // Initialize Supabase
        const { createClient } = supabase;
        const supabaseClient = createClient(
            'https://qxjqtirmwykngbsjhdle.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4anF0aXJtd3lrbmdic2poZGxlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzUzMjUzMzAsImV4cCI6MjA1MDkwMTMzMH0.Yj-0sj2FfuxQlI9gqzlpw3T3aJAJuC8N0aLq1fY1234'
        );
        
        const form = document.getElementById('resetForm');
        const messageEl = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');
        const formContainer = document.getElementById('resetFormContainer');
        
        // ✅ Extract and verify token from URL on page load
        async function initializeSession() {
            try {
                // Get hash from URL (contains access_token)
                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                const accessToken = hashParams.get('access_token');
                const refreshToken = hashParams.get('refresh_token');
                const type = hashParams.get('type');
                
                console.log('Token type:', type);
                console.log('Has access token:', !!accessToken);
                
                if (!accessToken || type !== 'recovery') {
                    throw new Error('Invalid or expired reset link');
                }
                
                // ✅ Set the session with the tokens from URL
                const { data, error } = await supabaseClient.auth.setSession({
                    access_token: accessToken,
                    refresh_token: refreshToken || ''
                });
                
                if (error) throw error;
                
                console.log('Session established:', data.session);
                
                // Show form
                loading.style.display = 'none';
                formContainer.style.display = 'block';
                
            } catch (error) {
                console.error('Session init error:', error);
                loading.innerHTML = `
                    <div class="logo">❌</div>
                    <h1>Invalid Link</h1>
                    <p>${error.message}</p>
                    <p style="margin-top: 20px;">
                        <a href="#" onclick="window.close()" style="color: #667eea;">Close this window</a>
                    </p>
                `;
            }
        }
        
        // Initialize on page load
        initializeSession();
        
        // Handle form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Validate
            if (password !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }
            
            if (password.length < 8) {
                showMessage('Password must be at least 8 characters', 'error');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Resetting...';
            
            try {
                // ✅ Update password (session already established)
                const { error } = await supabaseClient.auth.updateUser({
                    password: password
                });
                
                if (error) throw error;
                
                // Success!
                showMessage('✅ Success! Password updated. You can now log in with your new password.', 'success');
                form.style.display = 'none';
                
                // Show return message
                setTimeout(() => {
                    formContainer.innerHTML = `
                        <div class="logo">✅</div>
                        <h1 style="color: #155724;">Password Updated!</h1>
                        <p style="color: #155724; font-size: 16px; margin: 20px 0;">
                            Your password has been successfully reset.
                        </p>
                        <p style="font-size: 14px;">
                            Please return to the HabitStack app and log in with your new password.
                        </p>
                        <button onclick="window.close()" style="margin-top: 20px;">
                            Close This Window
                        </button>
                    `;
                }, 1000);
                
            } catch (error) {
                console.error('Reset error:', error);
                showMessage('Error: ' + error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
            }
        });
        
        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = 'message ' + type;
            messageEl.style.display = 'block';
        }
    </script>
</body>
</html>
